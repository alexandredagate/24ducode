services:

  # Dashboard Next.js
  dash:
    build:
      context: .
      dockerfile: apps/dash/Dockerfile
    container_name: ek24_dash
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/dash/.next
    depends_on:
      - api

  # Game Vite + WebGL
  game:
    build:
      context: .
      dockerfile: apps/game/Dockerfile
    container_name: ek24_game
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

  # API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ek24_api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules

  # Agent Python FastAPI
  agent:
    build:
      context: apps/agent
      dockerfile: Dockerfile
    container_name: ek24_agent
    # depends_on:
    #   - api
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # ✅ Monte UNIQUEMENT le code source — le .venv construit dans l'image reste intact
      - ./apps/agent/app:/app/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
