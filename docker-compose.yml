version: "3.9"

services:

  # Dashboard Next.js
  dash:
    build:
      context: .
      dockerfile: apps/dash/Dockerfile
    container_name: ek24_dash
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/dash/.next
    depends_on:
      - api

  # Game Vite + WebGL
  game:
    build:
      context: .
      dockerfile: apps/game/Dockerfile
    container_name: ek24_game
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

  # Agent Python FastAPI
  agent:
    build:
      context: apps/agent
      dockerfile: Dockerfile
    container_name: ek24_agent
    ports:
      - "8000:8000"
    environment:
      - ENV=development
    volumes:
      - ./apps/agent:/app
