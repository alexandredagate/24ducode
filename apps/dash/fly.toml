app = '24ducode-dash'
primary_region = 'cdg'

[build]
  dockerfile = 'apps/dash/Dockerfile'
  [build.args]
    NEXT_PUBLIC_API_URL = 'https://24ducode-api.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpus = 1
